---
name: CI

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug:
        type: choice
        description: Debug mode
        required: false
        options:
          - "true"
          - "false"

# Allow one concurrent
concurrency:
  group: ${{ format('{0}-{1}-{2}-{3}-{4}', github.workflow, github.event_name, github.ref, github.base_ref, github.head_ref) }}
  cancel-in-progress: true

env:
  DEBUG: ${{ inputs.debug || secrets.ACTIONS_RUNNER_DEBUG || vars.ACTIONS_RUNNER_DEBUG || secrets.ACTIONS_STEP_DEBUG || vars.ACTIONS_STEP_DEBUG || false }}

jobs:
  dog-food:
    name: Dog food (test inputs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Debug
        uses: raven-actions/debug@9dbdeb7eea607a7d73411895c65987e71d59a466 # v1.2.0
        with:
          vars-context: ${{ toJson(vars) }}
          secrets-context: ${{ toJson(secrets) }}
          needs-context: ${{ toJson(needs) }}
          inputs-context: ${{ toJson(inputs) }}

      - name: actionlint Action (old version)
        uses: ./
        with:
          version: "1.6.23"
          shellcheck: false
          pyflakes: false
          files: "tests/fixtures/*.yml, tests/fixtures/*.yaml"
          flags: "-ignore SC2086"
          fail-on-error: false

      - name: actionlint Action (test broken)
        id: actionlint
        uses: ./
        with:
          files: "tests/fixtures/*.yml, tests/fixtures/*.yaml"
          flags: "-ignore SC2086"
          fail-on-error: false
          group-result: false

      - name: actionlint Outputs
        if: ${{ steps.actionlint.outputs.exit-code != '0' }}
        run: |
          echo "Used actionlint version ${{ steps.actionlint.outputs.version-semver }}"
          echo "Used actionlint release ${{ steps.actionlint.outputs.version-tag }}"
          echo "actionlint ended with ${{ steps.actionlint.outputs.exit-code }} exit code"
          echo "actionlint ended because '${{ steps.actionlint.outputs.exit-message }}'"
          echo "actionlint found ${{ steps.actionlint.outputs.total-errors }} errors"
          echo "actionlint checked ${{ steps.actionlint.outputs.total-files }} files"
          echo "actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"

  dog-food-matrix:
    name: Dog food (test runners)
    needs:
      - dog-food
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: actionlint Action
        id: actionlint
        uses: ./
        with:
          flags: "-ignore SC2086"
          fail-on-error: false

      - name: actionlint Outputs
        if: ${{ always() }}
        run: |
          echo "Used actionlint version ${{ steps.actionlint.outputs.version-semver }}"
          echo "Used actionlint release ${{ steps.actionlint.outputs.version-tag }}"
          echo "actionlint ended with ${{ steps.actionlint.outputs.exit-code }} exit code"
          echo "actionlint ended because '${{ steps.actionlint.outputs.exit-message }}'"
          echo "actionlint found ${{ steps.actionlint.outputs.total-errors }} errors"
          echo "actionlint checked ${{ steps.actionlint.outputs.total-files }} files"
          echo "actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"
          # shellcheck disable=SC2242
          exit ${{ steps.actionlint.outputs.exit-code }}

  dog-food-non-npm:
    name: Dog food (pnpm/non-npm repo)
    needs:
      - dog-food
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Regression guard for issues #26 and #60:
      #   #26 - the action's internal `npm install` of @actions/tool-cache must not break in a
      #         consuming repo that uses pnpm/workspaces (a `workspace:` protocol dependency makes
      #         a plain `npm install` fail with EUNSUPPORTEDPROTOCOL).
      #   #60 - the action must not leave a stray node_modules behind in the workspace.
      - name: Simulate a pnpm/workspace (non-npm) repo
        run: |
          cat > package.json <<'EOF'
          {
            "name": "non-npm-consumer",
            "version": "1.0.0",
            "private": true,
            "packageManager": "pnpm@9.0.0",
            "dependencies": {
              "some-internal-pkg": "workspace:*"
            },
            "scripts": {
              "preinstall": "npx only-allow pnpm"
            }
          }
          EOF
          printf 'packages:\n  - "packages/*"\n' > pnpm-workspace.yaml

      - name: actionlint Action
        id: actionlint
        uses: ./
        with:
          cache: false # force the internal npm install to run (skip the cache-hit short-circuit)
          files: "tests/fixtures/*.yml, tests/fixtures/*.yaml"
          flags: "-ignore SC2086"
          fail-on-error: false

      - name: Verify the tool ran and left no stray node_modules
        run: |
          echo "version: ${{ steps.actionlint.outputs.version-semver }} / exit-code: ${{ steps.actionlint.outputs.exit-code }}"
          # outputs are only populated once environment + npm install + download succeeded
          if [ -z "${{ steps.actionlint.outputs.exit-code }}" ]; then
            echo "::error::actionlint did not run - internal npm install of @actions/tool-cache likely failed (#26 regression)"
            exit 1
          fi
          # the action must not pollute the workspace with a node_modules directory
          if [ -d node_modules ]; then
            echo "::error::stray node_modules left in the workspace (#60 regression)"
            exit 1
          fi
